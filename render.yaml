databases:
  - name: stockpilot-db
    databaseName: stockpilot_oms
    user: stockpilot
    plan: free

services:
  - type: web
    name: stockpilot-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -e .[dev]
    startCommand: python scripts/apply_migrations.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockpilot-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: CORS_ALLOW_ORIGINS
        value: https://stockpilot-web.onrender.com,https://frontend-beta-nine-56.vercel.app
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: ^https://.*\.vercel\.app$
  - type: web
    name: stockpilot-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: /api/v1
      - key: API_PROXY_TARGET
        value: https://stockpilot-api.onrender.com
