databases:
  - name: stockpilot-db
    databaseName: stockpilot_oms
    user: stockpilot
    plan: free

services:
  - type: web
    name: stockpilot-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -e .[dev]
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockpilot-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: CORS_ALLOW_ORIGINS
        value: https://stockpilot-tawny.vercel.app
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: ^https://.*\.vercel\.app$
